model:
  name: google/flan-t5-small
  max_input_length: 256
  max_target_length: 512

training:
  learning_rate: 0.003
  train_batch_size: 8
  eval_batch_size: 4
  weight_decay: 0.01
  num_epochs: 1
  save_total_limit: 3

lora_config:
  rank: 8
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules: ["q", "v"]

data:
  test_split: 0.25

output:
  dir: ./inferences